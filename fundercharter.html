const { useState, useEffect, useRef, createContext, useContext } = React;

const ScrollColorCtx = createContext({ fg:"#353535", label:"#275D43", isDark:false });

function useReveal(threshold=0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

// ─── Layout primitives ───────────────────────────────────────────────────────
function ProgressBar() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const fn = () => {
      const el = document.documentElement;
      setPct(el.scrollTop / (el.scrollHeight - el.clientHeight) * 100);
    };
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return (
    <div style={{ position:"fixed", top:0, left:0, width:`${pct}%`, height:3,
      background:`linear-gradient(90deg, ${B.primary}, ${B.accent})`,
      zIndex:2000, transition:"width 0.1s linear" }} />
  );
}

function Reveal({ children, delay=0, direction="up" }) {
  const [ref, visible] = useReveal();
  const transforms = { up:visible?"none":"translateY(28px)", down:visible?"none":"translateY(-28px)", none:"none" };
  return (
    <div ref={ref} style={{ opacity:visible?1:0,
      transform:transforms[direction]||transforms.up,
      transition:`opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s` }}>
      {children}
    </div>
  );
}

function Divider({ color }) {
  const { isDark } = useContext(ScrollColorCtx);
  const c = color || (isDark?B.accent:B.primary);
  return (
    <Reveal delay={0.1} direction="none">
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center",
        gap:16, margin:"0 auto", maxWidth:160 }}>

        <span style={{ fontSize:18, color:c, opacity:0.7, lineHeight:1 }}>✸</span>
        <div style={{ flex:1, height:1, background:c, opacity:0.4 }} />
      </div>

  );
}

function CountUp({ target, visible, delay=0 }) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!visible) return;
    let start=null; const dur=1000;
    const animate = ts => {
      if (!start) start=ts;
      const p = Math.min((ts-start)/dur, 1);
      const e = 1-Math.pow(1-p,3);
      setCount(Math.round(e*target));
      if (p<1) requestAnimationFrame(animate);
    };
    const t = setTimeout(() => requestAnimationFrame(animate), delay);
    return () => clearTimeout(t);
  }, [visible,target,delay]);
  return <>{count}</>;
}

function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const fn = () => {
      const el = document.documentElement;
      setP(Math.min(1, Math.max(0, el.scrollTop/(el.scrollHeight-el.clientHeight))));
    };
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return p;
}

function lerpColor(a,b,t) {
  const p=(s,i)=>parseInt(s.slice(i,i+2),16);
  const r=Math.round(p(a,1)+(p(b,1)-p(a,1))*t);
  const g=Math.round(p(a,3)+(p(b,3)-p(a,3))*t);
  const bl=Math.round(p(a,5)+(p(b,5)-p(a,5))*t);
  return `rgb(${r},${g},${bl})`;
}

  useEffect(() => {

    const init = setTimeout(() => {
      function check() {
        const el = gridRef.current;
        if (!el || hasTriggered.current) return;
        const rect = el.getBoundingClientRect();

          {sec.cards.map((c,i) => (
            <Reveal key={i} delay={0.1*(i+1)}>
              <div style={{ padding:"24px 0" }}>
                <h3 style={{ fontFamily:FONTS.serif, fontSize:18, fontWeight:600,
                  color:B.accent, margin:"0 0 8px" }}>{c.title}</h3>
                <p style={{ fontFamily:FONTS.serif, fontSize:16, lineHeight:1.7,
                  color:B.background, opacity:0.75, margin:0 }}
                  dangerouslySetInnerHTML={{ __html:c.body }}/>
              </div>
            </Reveal>
          ))}
        </div>
      </Band>
    );
  }

  // Normal section
  return (
    <ScrollColorCtx.Consumer>
      {ctx => {
        const { isDark } = ctx;
        return (
        <section style={{ padding:"64px 0" }}>
          {sec.chapter && <Chapter label={sec.chapter} id={sec.id}/>}
          {sec.h2 && <H2>{sec.h2}</H2>}
          {sec.dropcap_paragraph && (Array.isArray(sec.dropcap_paragraph)
                    ? <>
                        <DropCap>{sec.dropcap_paragraph[0]}</DropCap>
                        {sec.dropcap_paragraph.slice(1).map((p,i) => <P key={i}>{p}</P>)}
                      </>
                    : <DropCap>{sec.dropcap_paragraph}</DropCap>
                  )}
          {sec.subheading && (
            <Reveal>
              <h3 style={{ fontFamily:FONTS.sans, fontSize:15, fontWeight:500,
                color:isDark?B.accent:B.primary, lineHeight:1.4, margin:"0 0 32px",
                letterSpacing:"0.06em", textTransform:"uppercase" }}>
                {sec.subheading}
              </h3>
            </Reveal>
          )}
          {sec.intro_paragraphs && sec.intro_paragraphs.map((p,i)=><P key={i}>{p}</P>)}
          {sec.quote_before_principles && <Quote>{sec.quote_before_principles}</Quote>}
          {sec.principles_intro && <P>{sec.principles_intro}</P>}
          {sec.principles && sec.principles.map(pr=>(
            <Principle key={pr.number} number={pr.number} title={pr.title} body={pr.body}/>
          ))}
          {sec.paragraphs && sec.paragraphs.map((p,i) => {
            if (i===0 && !sec.dropcap_paragraph && !sec.intro_paragraphs) {
              return <P key={i}>{p}</P>;
            }
            return <P key={i}>{p}</P>;
          })}
          {sec.time_chart && <TimeChart data={sec.time_chart}/>}
          {sec.quote && <Quote>{sec.quote}</Quote>}
          {sec.callout && (
            <Reveal>
              <div style={{ background:B.primaryLight, borderRadius:6, padding:"28px 32px",
                margin:"40px 0", borderLeft:`3px solid ${B.primary}` }}>
                <p style={{ fontFamily:FONTS.serif, fontSize:18, lineHeight:1.75,
                  color:B.text, margin:0, opacity:0.9 }}>
                  <strong>{sec.callout.bold_prefix}</strong> {sec.callout.body}
                </p>
              </div>
            </Reveal>
          )}
          {sec.closing_paragraphs && sec.closing_paragraphs.map((p,i)=><P key={i}>{p}</P>)}
          {sec.closing_quote && <Quote>{sec.closing_quote}</Quote>}
          {sec.animation && (
            <Reveal>
              <AnimationEmbed src={sec.animation.src}/>
              <figcaption style={{ fontFamily:FONTS.sans, fontSize:13,
                color:textColor, opacity:0.6, marginTop:10, lineHeight:1.5,
                fontStyle:"italic" }}>
                {sec.animation.caption}{" "}
                <span style={{ opacity:0.5 }}>{sec.animation.caption_hint}</span>
              </figcaption>
            </Reveal>
          )}
          {sec.transform_image_caption && (
            <Reveal>
              <figure style={{ margin:"40px 0 0" }}>
                <ZoomableImg
                  src={TRANSFORM_IMG}
                  alt={sec.transform_image_caption}
                  style={{ width:"100%", borderRadius:6 }}/>
                <figcaption style={{ fontFamily:FONTS.sans, fontSize:13,
                  color:B.text, opacity:0.5, marginTop:10, lineHeight:1.5,
                  fontStyle:"italic" }}>{sec.transform_image_caption}</figcaption>
              </figure>
            </Reveal>
          )}
          {sec.outcome_boxes && (
            <OutcomeBoxes boxes={sec.outcome_boxes} />
          )}
        </section>
        );
      }}
    </ScrollColorCtx.Consumer>
  );
}

// ─── Main Article ─────────────────────────────────────────────────────────────
function Article() {
  const C = CONTENT;

  // Update page title
  useEffect(() => {
    document.title = C.meta.title;
    document.querySelector("title").textContent = C.meta.title;
  }, []);

  const [heroVis, setHeroVis] = useState(false);
  useEffect(() => { const t=setTimeout(()=>setHeroVis(true),200); return ()=>clearTimeout(t); }, []);
  const sp = useScrollProgress();

  const bgColor = sp<0.2 ? lerpColor("#0A0A0A","#0F2A1A",sp/0.2)
    : sp<0.5 ? lerpColor("#0F2A1A","#FAFAF2",(sp-0.2)/0.3)
    : "#FAFAF2";

  const textColor = sp<0.35 ? "#F0EDE6"
    : sp<0.5 ? lerpColor("#F0EDE6","#353535",(sp-0.35)/0.15)
    : "#353535";

  const isDark = sp<0.45;
  const labelColor = isDark?B.accent:B.primary;
  const scrollCtx = { fg:textColor, label:labelColor, isDark };

  const hs = d => ({
    opacity:heroVis?1:0,
    transform:heroVis?"none":"translateY(36px)",
    transition:`all 1.2s cubic-bezier(0.22,1,0.36,1) ${d}s`,
  });

  // Group sections: separate stats/sms bands from normal sections
  const sectionGroups = [];
  let currentGroup = [];
  C.sections.forEach(sec => {
    if (sec.type === "stats_band" || sec.type === "sms_band") {
      if (currentGroup.length) { sectionGroups.push({ type:"normal", secs:currentGroup }); currentGroup=[]; }
      sectionGroups.push({ type:"band", sec });
    } else if (sec.type === "dark_band") {
      if (currentGroup.length) { sectionGroups.push({ type:"normal", secs:currentGroup }); currentGroup=[]; }
      sectionGroups.push({ type:"band", sec });
    } else {
      currentGroup.push(sec);
    }
  });
  if (currentGroup.length) sectionGroups.push({ type:"normal", secs:currentGroup });

  return (
    <>
      <ProgressBar/>
      <TocMenu/>
      <ScrollColorCtx.Provider value={scrollCtx}>
      <div style={{ background:bgColor, minHeight:"100vh", color:textColor,
        overflowX:"hidden", transition:"background 0.05s linear, color 0.05s linear" }}>

        {/* Hero */}
        <header style={{ minHeight:"100vh", display:"flex", flexDirection:"column",
          justifyContent:"center", alignItems:"center", textAlign:"center",
          padding:"80px 24px 120px", position:"relative", background:"#0A0A0A" }}>
          <div style={{ position:"absolute", top:"30%", left:"50%",
            transform:"translate(-50%,-50%)", width:500, height:500, borderRadius:"50%",
            background:`radial-gradient(circle, rgba(224,153,100,0.06) 0%, transparent 70%)`,
            opacity:heroVis?1:0, transition:"opacity 2s ease 0.5s", pointerEvents:"none" }}/>
          <div style={hs(0.3)}>
            <div style={{ fontFamily:FONTS.sans, fontSize:13, letterSpacing:"0.2em",
              textTransform:"uppercase", color:B.accent, marginBottom:24, opacity:0.8 }}>
              <span dangerouslySetInnerHTML={{__html: C.hero.eyebrow}} />
            </div>
          </div>
          <div style={hs(0.5)}>
            <h1 style={{ fontFamily:FONTS.serif, fontSize:"clamp(56px,9vw,108px)",
              fontWeight:800, color:"#F0EDE6", lineHeight:1.02,
              maxWidth:900, margin:"0 auto 28px", letterSpacing:"-0.03em" }}>
              {C.hero.title_before_emphasis}{" "}
              <em style={{ fontStyle:"italic", color:B.accent }}>{C.hero.title_emphasis}</em>
            </h1>
          </div>
          <div style={hs(0.7)}>
            <p style={{ fontFamily:FONTS.serif, fontSize:"clamp(17px,2.2vw,22px)",
              color:"#F0EDE6", opacity:0.5, maxWidth:560, margin:"0 auto 40px",
              lineHeight:1.6, fontStyle:"italic" }}>
              {C.hero.subtitle}
            </p>
          </div>
          <div style={{ position:"absolute", bottom:40, left:"50%",
            transform:"translateX(-50%)", opacity:heroVis?0.3:0,
            transition:"opacity 1.5s ease 1.8s", animation:"float 2.5s ease-in-out infinite" }}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="#F0EDE6" strokeWidth="1.5">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
          </div>
        </header>

        {/* Content */}
        <main style={{ padding:"0 24px" }}>
          <div style={{ maxWidth:720, margin:"0 auto" }}>
            {sectionGroups.map((g,gi) => {
              if (g.type==="band") {
                const needsLightCtx = g.sec.type === "stats_band" || g.sec.type === "sms_band" || g.sec.type === "dark_band";
                return (
                  <React.Fragment key={gi}>
                    <Divider color={B.accent}/>
                    <RenderSection sec={g.sec} textColor={textColor}/>
                  </React.Fragment>
                );
              }
              return (
                <React.Fragment key={gi}>
                  {gi>0 && <Divider/>}
                  {g.secs.map((sec,si) => {
                    // Force light context for "A Different Model" section
                    const forceLight = sec.id === "sec-programs";
                    const ctx = forceLight
                      ? { fg:B.text, label:B.primary, isDark:false }
                      : scrollCtx;
                    return (
                      <ScrollColorCtx.Provider key={sec.id} value={ctx}>
                        <RenderSection sec={sec} textColor={textColor}/>
                        {si < g.secs.length-1 && <Divider/>}
                      </ScrollColorCtx.Provider>
                    );
                  })}
                </React.Fragment>
              );
            })}

            {/* CTA */}
            <Divider color={B.accent}/>
            <section style={{ padding:"64px 0" }}>
              <Reveal>
                <div style={{ textAlign:"center", maxWidth:560, margin:"0 auto" }}>
                  <div style={{ fontFamily:FONTS.sans, fontSize:12, letterSpacing:"0.2em",
                    textTransform:"uppercase", color:B.primary, marginBottom:16, fontWeight:500 }}>
                    {C.cta.eyebrow}
                  </div>
                  {C.cta.h2 && <h2 style={{ fontFamily:FONTS.serif, fontSize:32, fontWeight:700,
                    color:B.text, lineHeight:1.3, margin:"0 0 20px" }}>
                    {C.cta.h2}
                  </h2>}
                  <p style={{ fontFamily:FONTS.serif, fontSize:18, lineHeight:1.75,
                    color:B.text, opacity:0.75, margin:"0 0 36px" }}>
                    {C.cta.body}
                  </p>
                  <div style={{ display:"flex", flexDirection:"column", gap:16, alignItems:"center" }}>
                    <a href="#tally-open=kdOLRr&tally-emoji-text=👋&tally-emoji-animation=wave&tally-auto-close=2000"
                      style={{ display:"inline-block", padding:"16px 40px", background:B.primary,
                        color:B.background, fontFamily:FONTS.sans, fontSize:15, fontWeight:500,
                        letterSpacing:"0.08em", textDecoration:"none", borderRadius:4,
                        transition:"opacity 0.2s", animation:"pulse 2.8s ease-in-out infinite" }}>
                      {C.cta.button_primary.label}
                    </a>

                  </div>
                </div>
              </Reveal>
            </section>

            <Divider color={B.accent}/>

            {/* References */}
            <section id="sec-references" style={{ padding:"48px 0 24px",
              borderTop:`1px solid ${B.primaryMid}`, scrollMarginTop:80 }}>
              <Reveal>
                <div style={{ fontFamily:FONTS.sans, fontSize:12, letterSpacing:"0.2em",
                  textTransform:"uppercase", color:B.primary, marginBottom:24 }}>
                  References
                </div>
                {C.references.map((r,i) => (
                  <div key={i} style={{ marginBottom:14 }}>
                    <a href={r.url} target="_blank" rel="noopener noreferrer"
                      style={{ fontFamily:FONTS.serif, fontSize:16, color:B.primary,
                        textDecoration:"none", borderBottom:`1px solid ${B.primaryMid}`,
                        lineHeight:1.5 }}>
                      {r.text}
                    </a>
                  </div>
                ))}
              </Reveal>
            </section>

            {/* Sign Charter CTA */}
            <section style={{ padding:"64px 0 48px", textAlign:"center" }}>
              <Reveal>
                <a
                  href="#tally-open=kdOLRr&tally-emoji-text=👋&tally-emoji-animation=wave&tally-auto-close=2000"
                  style={{
                    display:"inline-block",
                    padding:"18px 48px",
                    background:B.primary,
                    color:B.background,
                    fontFamily:FONTS.sans,
                    fontSize:15,
                    fontWeight:500,
                    letterSpacing:"0.1em",
                    textTransform:"uppercase",
                    textDecoration:"none",
                    borderRadius:4,
                    boxShadow:"0 4px 20px rgba(39,93,67,0.18)",
                    animation:"pulse 2.8s ease-in-out infinite",
                  }}
                >
                  Sign on to support the People-First Data Charter
                </a>
              </Reveal>
            </section>

            {/* Footer */}
            <footer style={{ padding:"80px 0 64px",
              borderTop:`1px solid ${B.primaryMid}`, marginTop:24 }}>
              <Reveal>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center",
                  textAlign:"center", gap:12 }}>
                  <div style={{ fontFamily:FONTS.sans, fontSize:13, color:B.text,
                    opacity:0.5, letterSpacing:"0.1em", textTransform:"uppercase" }}>
                    {C.footer.org} · {C.footer.location} · {C.footer.territory}
                  </div>
                  <div style={{ fontFamily:FONTS.sans, fontSize:13, color:B.text, opacity:0.4 }}>
                    <a href={`mailto:${C.footer.email}`}
                      style={{ color:B.primary, textDecoration:"none" }}>
                      {C.footer.email}
                    </a>
                    {" · "}
                    <a href={C.footer.charter_url}
                      style={{ color:B.primary, textDecoration:"none" }}>
                      {C.footer.charter_label}
                    </a>
                  </div>
                </div>
              </Reveal>
            </footer>
          </div>
        </main>
      </div>
      </ScrollColorCtx.Provider>
      <style>{`
        ::selection { background:${B.primaryLight}; color:${B.text}; }
        a:hover { opacity:0.8; }
      `}</style>
    </>
  );
}

ReactDOM.render(React.createElement(Article), document.getElementById("root"));
  </script>


</body>
